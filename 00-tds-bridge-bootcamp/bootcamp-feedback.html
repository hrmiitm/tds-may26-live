<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TDS Bootcamp — Student Feedback Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fc;--surface:#fff;--border:#e2e6ef;--text:#1a1d2e;
  --muted:#6b7394;--radius:14px;
  --day1:#6c63ff;--day2:#0891b2;--day3:#059669;--day4:#dc2626;--day5:#d97706;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.6}
a{color:var(--day1);text-decoration:none}

/* ── Header ─────────────────────────── */
header{text-align:center;padding:48px 24px 28px;background:#fff;border-bottom:1px solid var(--border)}
header h1{font-size:2.2rem;font-weight:800;color:#1a1d2e}
header h1 span{background:linear-gradient(135deg,var(--day1),var(--day2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .sub{color:var(--muted);font-size:.92rem;margin-top:4px}

/* ── Tabs ───────────────────────────── */
.tabs{display:flex;justify-content:center;gap:6px;padding:16px 24px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab-btn{padding:10px 28px;border:2px solid var(--border);border-radius:999px;background:#fff;font-size:.95rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .25s}
.tab-btn:hover{border-color:#c0c6d8}
.tab-btn.active{background:var(--day1);color:#fff;border-color:var(--day1)}
.tab-panel{display:none;padding:24px;max-width:1600px;margin:0 auto}
.tab-panel.active{display:block}

/* ── Stats bar ──────────────────────── */
.stats-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px}
.stat-chip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 18px;font-size:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-chip .count{font-weight:700;font-size:1.05rem}

/* ── Search ─────────────────────────── */
.search-wrap{display:flex;justify-content:center;margin-bottom:20px}
.search-wrap input{width:100%;max-width:540px;padding:13px 22px 13px 48px;border:2px solid var(--border);border-radius:999px;font-size:1rem;color:var(--text);background:#fff;outline:none;transition:border .2s,box-shadow .2s}
.search-wrap input:focus{border-color:var(--day1);box-shadow:0 0 0 4px rgba(108,99,255,.12)}
.search-wrap .ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--muted);pointer-events:none}
.search-wrap .rel{position:relative}
#result-count{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:18px}

/* ── Day grid ───────────────────────── */
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.day-col{display:flex;flex-direction:column;gap:14px}
.day-col.span2{grid-column:1/-1}
.day-col.span2 .cards-cont{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}

/* ── Day header ─────────────────────── */
.day-hdr{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;position:sticky;top:64px;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.day-icon{font-size:1.6rem;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0}
.day-label{font-weight:700;font-size:1.1rem}
.day-badge{margin-left:auto;font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:999px;white-space:nowrap}

/* ── Card ───────────────────────────── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.card:hover::before{opacity:1}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;color:#fff}
.card-id{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card-email{font-size:.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-text{font-size:.9rem;line-height:1.7;color:#3a4060;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.fb-text.expanded{display:block;-webkit-line-clamp:unset}
.expand-btn{margin-top:8px;font-size:.8rem;font-weight:600;color:var(--day1);cursor:pointer;background:none;border:none;padding:0;display:none}
.expand-btn.vis{display:inline}

/* Day-specific colours */
.d1 .day-hdr{border-left:4px solid var(--day1)}.d1 .day-label{color:var(--day1)}.d1 .card::before{background:var(--day1)}.d1 .avatar{background:var(--day1)}.d1 .day-icon{background:rgba(108,99,255,.08)}.d1 .day-badge{color:var(--day1);background:rgba(108,99,255,.08)}
.d2 .day-hdr{border-left:4px solid var(--day2)}.d2 .day-label{color:var(--day2)}.d2 .card::before{background:var(--day2)}.d2 .avatar{background:var(--day2)}.d2 .day-icon{background:rgba(8,145,178,.08)}.d2 .day-badge{color:var(--day2);background:rgba(8,145,178,.08)}
.d3 .day-hdr{border-left:4px solid var(--day3)}.d3 .day-label{color:var(--day3)}.d3 .card::before{background:var(--day3)}.d3 .avatar{background:var(--day3)}.d3 .day-icon{background:rgba(5,150,105,.08)}.d3 .day-badge{color:var(--day3);background:rgba(5,150,105,.08)}
.d4 .day-hdr{border-left:4px solid var(--day4)}.d4 .day-label{color:var(--day4)}.d4 .card::before{background:var(--day4)}.d4 .avatar{background:var(--day4)}.d4 .day-icon{background:rgba(220,38,38,.08)}.d4 .day-badge{color:var(--day4);background:rgba(220,38,38,.08)}
.d5 .day-hdr{border-left:4px solid var(--day5)}.d5 .day-label{color:var(--day5)}.d5 .card::before{background:var(--day5)}.d5 .avatar{background:var(--day5)}.d5 .day-icon{background:rgba(217,119,6,.08)}.d5 .day-badge{color:var(--day5);background:rgba(217,119,6,.08)}

/* ══ TAB 2: Student Submissions ═══════ */
.load-bar{display:flex;align-items:center;gap:14px;justify-content:center;padding:16px;margin-bottom:20px;background:#fff;border:1px solid var(--border);border-radius:var(--radius)}
.load-bar .bar{flex:1;max-width:400px;height:8px;background:#eef0f5;border-radius:999px;overflow:hidden}
.load-bar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--day1),var(--day2));transition:width .3s}
.load-bar .pct{font-weight:700;font-size:.9rem;min-width:50px}

.stu-list{display:flex;flex-direction:column;gap:20px}

/* Student accordion */
.stu-acc{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.stu-top{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;transition:background .15s;user-select:none}
.stu-top:hover{background:#f1f3f9}
.stu-top .av2{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#fff;background:var(--day1);flex-shrink:0}
.stu-top .info{flex:1;min-width:0}
.stu-top .em{font-weight:700;font-size:1rem}
.stu-top .sid{font-size:.78rem;color:var(--muted)}
.stu-top .sc{font-weight:700;font-size:1rem;padding:5px 14px;border-radius:999px;background:rgba(5,150,105,.08);color:var(--day3)}
.stu-top .arrow{font-size:1.2rem;color:var(--muted);transition:transform .3s}
.stu-acc.open .stu-top .arrow{transform:rotate(180deg)}
.stu-body{display:none;border-top:1px solid var(--border);padding:0}
.stu-acc.open .stu-body{display:block}

/* Day sections inside accordion */
.day-sec{border-bottom:1px solid var(--border);padding:20px 24px}
.day-sec:last-child{border-bottom:none}
.day-sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-weight:700;font-size:1.05rem}
.day-sec-hdr .di{font-size:1.3rem}
.sec-block{margin-bottom:16px;padding:14px 18px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.sec-block h4{font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.sec-block p,.sec-block .cl-items{font-size:.9rem;line-height:1.7;color:#3a4060}
.sec-block .placeholder{color:var(--muted);font-style:italic;font-size:.85rem}

/* Checklist items */
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:.88rem}
.cl-item .ck{width:20px;height:20px;border-radius:5px;border:2px solid #d0d5e0;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:.7rem}
.cl-item.checked .ck{background:var(--day3);border-color:var(--day3);color:#fff}
.cl-item.unchecked .ck{background:#fff}

.stu-loading{text-align:center;padding:30px;color:var(--muted);font-size:.9rem}
.stu-error{text-align:center;padding:14px;color:var(--day4);font-size:.85rem;background:rgba(220,38,38,.05);border-radius:8px}

.hidden{display:none!important}
@media(max-width:860px){.day-grid{grid-template-columns:1fr}.day-col.span2{grid-column:auto}}
</style>
</head>

<header>
  <h1>📋 TDS Bootcamp — <span>Student Feedback</span></h1>
  <p class="sub">Generated 08 Jun 2026, 01:54 AM · 63 feedback entries · 105 students · May 2026 Bootcamp</p>

<div class="tabs">

y to follow along. It would be great to have a few additional real-world exercises at the end of each topic so learners can reinforce the concepts independently.", "day2": "The session was easy to follow and the practical exercises helped reinforce the concepts well. The examples were useful for understanding real Linux workflows. It would be great to include a few more challenge exercises at the end for additional practice.", "day3": "The session was well organized and practical. Since many learners may be coming from traditional pip and venv workflows, the introduction to uv was very helpful. It would be great to include a few advanced examples showing dependency management across larger projects and multiple Python versions.", "day4": "The hands-on approach was very useful. Since some learners may already have prior experience with FastAPI or backend development, it could be helpful to include optional advanced exercises involving authentication, API rate limiting, request validation, or integrating external APIs. These additions would provide extra challenges for experienced participants while keeping the core material accessible to beginners.", "day5": "The content was well structured and easy to follow. Since some learners may already have experience with Git and GitHub, optional advanced exercises covering branching strategies, merge conflicts, rebasing, pull requests, and GitHub Actions could provide additional learning opportunities while keeping the core material beginner-friendly."}, {"id": "300583", "email": "24f2005579@ds.study.iitm.ac.in", "day1": "I need to do this later", "day2": "I need to do this later", "day3": "I need to do this later", "day4": "I need to do this later", "day5": "I need to do this later"}, {"id": "300573", "email": "23f3004447@ds.study.iitm.ac.in", "day1": "ya pretty cool", "day2": "", "day3": "is easy", "day4": "", "day5": ""}, {"id": "300400", "email": "24f2003108@ds.study.iitm.ac.in", "day1": "", "day2": "", "day3": "", "day4" hrough them. Thanks for such a wonderful curriculum!", "day5": "This is my feedback: Thanks for this wonderfully structured journey. I would love to have more of these checklists on a weekly or monthly basis; it is much more enjoyable to learn this way than through long videos and lectures. I really appreciate how we are given specific tasks to learn at our own pace, little by little."}, {"id": "299968", "email": "24f2006788@ds.study.iitm.ac.in", "day1": "Really nice and great way of introducing things ...", "day2": "Nice lecture...", "day3": "Great lecture ...", "day4": "Nice lecture.New and interesting concepts", "day5": "Overall the bootcamp was really helpful getting a first hand experience of many new commands but would be really helpful if it is a bit more structured.Seeing so many new things together was a bit overwhelming overall. \nA guide or notes after the lecture suggesting which topics are more important and to be studied deeply and which can be just brushed off along with \nthe resources from where we can learn.I tried the llm approach also but the question still remains that whether it was enough or something important got missed\nas all topics are really vast in itself,would be really really helpful.A very personal opinion as i found some topics really new and found myself out of track at some places\nand as sir said that this course would become self paced soon so it would help students in coming terms as well.\nBut a really nice initiative and way of starting the course,really enjoyed the bootcamp(although not able to attend it live but watching the recording also was truly worth it)..."}, {"id": "299915", "email": "21f3000381@ds.study.iitm.ac.in", "day1": "The session was fine co ve a bit crisper.", "day2": "The session was fine", "day3": "", "day4": "", "day5": ""}, {"id": "299913", "email": "22f3002973@ds.study.iitm.ac.in", "day1": "---  The session was informative", "day2": "--- Session was good", "day3": "--- Session was good", "day4": "--- Sesion was informative", "day5": "--- Session was good"}, {"id": "299870", "email": "22f3000233@ds.study.iitm.ac.in", "day1": "The session was very helpful and easy to follow.", "day2": "The exercises were useful and practical.", "day3": "The hands-on examples were useful.", "day4": "The practical FastAPI exercise was very useful.", "day5": "The Git workflow exercises were very useful."}, {"id": "299793", "email": "23f3002755@ds.study.iitm.ac.in", "day1": "very good course orientation!", "day2": "", "day3": "", "day4": "", "day5": ""}, {"id": "299736", "email": "24f2006510@ds.study.iitm.ac.in", "day1": "This is my feedback, great session.", "day2": "This is my feedback, great session.", "day3": "This is my feedback, great session.", "day4": "This is my feedback, great session.", "day5": "This is my feedback, great session"}, {"id": "299685", "email": "25f1002355@ds.study.iitm.ac.in", "day1": "Nice Session\nAs I am from non programming background, this session helped me a lot.", "day2": "", "day3": "This course significantly improved my confidence in working with Linux, Python, GitHub, development environments, and AI-assisted workflows.", "day4": "Working with HTTP requests, APIs, FastAPI, browser developer tools, and curl helped me understand how clients and servers communicate in real applications.", "day5": "The exercises were practical and helped me become much more comfortable using Git and GitHub as part of a professional development workflow."}, {"id": "299659", "email": "24f1001164@ds.study.iitm.ac.in", "day1": "The exercises were useful and helped reinforce Linux and GitHub fundamentals.", "day2": "", "day3": "", "day4": "", "day5": ""}, {"id": "299645", "email": "25f2007833@ds.study.iitm.ac.in", "day1": "A Good Start for a beginner in Linux.  The session was good and interactive. Thankyou to the team!", "day2": "It would be helpful to include a few more real-world examples demonstrating pipes and redirection", "day3": "", "day4": "This is my feedback : It can be more interactive, organised, and handson. Overall, I liked the session.", "day5": ""}, {"id": "299518", "email": "24f1002787@ds.study.iitm.ac.in", "day1": "The bootcamp content is well-structured and beginner-friendly. More visual diagrams for filesystem navigation would help.", "day2": "Adding more real-world pipe chaining examples would make this day more practical and engaging.", "day3": "A comparison table between uv, pip, and conda would be a great reference to include in the materials.", "day4": "It would be helpful to include a mini-project like building a simple notes API to tie all concepts together on Day 4.", "day5": "The bootcamp was very well paced overall. Adding a section on resolving merge conflicts would make the Git day even more complete."}, {"id": "299474", "email": "23f1001631@ds.study.iitm.ac.in", "day1": "The bootcamp was beginner-friendly and easy to follow. More real-world practice exercises and terminal-based mini tasks would make the learning experience even better.", "day2": "The hands-on terminal practice was useful and easy to follow. Additional real-life examples would help beginners understand concepts more deeply.", "day3": "The Python environment setup explanations were very helpful. More beginner examples for uv commands would make the learning smoother.", "day4": "The API exercises were practical and beginner friendly. More debugging examples would help learners understand HTTP concepts better.", "day5": "The Git and GitHub exercises were practical and useful. More examples involving real collaborative workflows would make the learning even stronger."}, {"id": "299471", "email": "21f1003863@ds.study.iitm.ac.in", "day1": "I think Astral uv isnt mentioned in the videos.", "day2": "Good session.", "day3": "Great session , all new topics for me.", "day4": "Amazing session.", "day5": "Good session"}, {"id": "299462", "email": "24f2001637@ds.study.iitm.ac.in", "day1": "This is my feedback:\nThe session was highly informative, especially the live demonstrations of WSL installations and troubleshooting. Breaking down the difference between Windows file paths and Linux paths side-by-side was incredibly helpful for visualizing the file structures.", "day2": "This is my feedback:\nThe visual breakdown mapping out parent and child processes to explain the `export` command was incredibly helpful. Showing how a variable stays trapped in the parent shell unless specifically exported made an abstract concept much easier to grasp. The live troubleshooting of the GitHub caching issue was also a valuable debugging lesson.", "day3": "This is my feedback:\nThe introduction to `uv` was eye-opening. Transitioning from standard `python -m venv` to `uv init` and seeing how it handles `pyproject.toml` and lockfiles automatically makes project structuring feel much more professional. I also appreciate the communication practice these written summaries provide as I actively work toward becoming a more fluent English speaker.", "day4": "This is my feedback:\nThe live demonstration of fetching an SVG from the OpenAI API via `curl` and rendering it visually was excellent for bridging the gap between raw data and actual frontend output. I also appreciated the candid advice at the end regarding how non-programmers should approach this diploma—focusing on AI debugging, conceptual semantics, and consistent collaboration on Discourse rather than pure syntax memorization.", "day5": "This is my feedback:\nThe storytelling approach used to explain Git—demonstrating a script breaking over several days due to server schema updates—made the \"why\" of version control much clearer than just memorizing the syntax. The live troubleshooting at the end regarding WSL partition space was also highly practical."}, {"id": "299325", "email": "23f3004034@ds.study.iitm.ac.in", "day1": "", "day2": "", "day3": "The uv concepts are not clear yet.", "day4": "I still can't use curl well. Also while solving the GA0, most of my FastAPI questions were failing.", "day5": ""}, {"id": "299269", "email": "22f1000561@ds.study.iitm.ac.in", "day1": "The bootcamp is well-structured and provides a very practical hands-on approach to essential development tools.", "day2": "Great instructions and very helpful explanations of core terminal concepts.", "day3": "Excellent overview of the modern Python package manager `uv` and why it is superior to legacy setups.", "day4": "Excellent explanations of network protocols and HTTP status codes, particularly the hands-on API development task.", "day5": "Excellent explanation of the Git conceptual model. Pushing tags and configuring branch defaults are very useful."}, {"id": "298982", "email": "24f2004141@ds.study.iitm.ac.in", "day1": "The hands-on terminal exercises were really helpful for a beginner. A short downloadable cheat-sheet of the day's commands would be a great addition.", "day2": "The pipes and redirection section was excellent. A few more real `grep` examples would make it even better.", "day3": "`uv` is a game changer compared to plain `pip`. The explanation of the lockfile and `pyproject.toml` was very clear.", "day4": "The FastAPI hands-on was the best part of the bootcamp. Some more real-world API examples would be a nice extension.", "day5": "A great structured introduction to Git. The SSH key setup walkthrough was especially useful and removed a lot of confusion."}, {"id": "298899", "email": "24f2007562@ds.study.iitm.ac.in", "day1": "speed of class was fine and the teaching style was good and thanks for quiz as it clear my doubt", "day2": "It would be helpful to include a few more real-world examples demonstrating pipes and redirection", "day3": "", "day4": "class was nice and  i very well understand use of  HTTP concepts, FastAPI and curl errors etc", "day5": "The session was well-structured and practical"}, {"id": "298821", "email": "24f2000062@ds.study.iitm.ac.in", "day1": "The session was beginner friendly and helped me understand Linux basics more clearly.", "day2": "The practical terminal exercises helped me understand Linux concepts much better than only reading theory.", "day3": "The hands-on examples made Python environment management much easier to understand compared to traditional setup tutorials.", "day4": "The practical API testing exercises and FastAPI examples made backend concepts much easier to understand.", "day5": "The practical Git workflow exercises were very useful and helped me understand version control more clearly than theory alone."}, {"id": "298721", "email": "23f3001843@ds.study.iitm.ac.in", "day1": "The bootcamp is challenging but very interesting. I was introduced to many new concepts and tools that I had never used before. Although some topics were difficult at first, the practical approach made learning enjoyable and rewarding.", "day2": "I found Day 2 both challenging and enjoyable. Working with Linux commands, environment variables, and command chaining was new to me, but the practical exercises helped me understand them better. The content is demanding, yet it keeps me motivated to learn and explore more.", "day3": "The session was challenging but very interesting. I learned several new concepts related to Python project management and dependency handling. The hands-on approach made the topics easier to understand and kept the learning experience engaging.", "day4": "The content was a bit difficult at first, but it became clearer through practice. Learning about HTTP requests, status codes, and API testing was a new experience for me. The exercises were useful and helped connect theory with real-world applications. Overall, I found the session both informative and enjoyable.", "day5": "The session was challenging but engaging. Git introduced several new concepts, and the practical exercises made them easier to understand. I particularly enjoyed learning how version control helps manage projects efficiently and track changes over time."}, {"id": "298653", "email": "23f2003391@ds.study.iitm.ac.in", "day1": "Good, thorough basics about terminal/shell commands.", "day2": "Good checklist that was covered.", "day3": "Good information about venvs and uv.", "day4": "Devtools could be more comprehensive with manipulations as well. But for a bootcamp from scratch, it is good.", "day5": "Comprehensive guide, best session of bootcamp."}, {"id": "298629", "email": "21f3002038@ds.study.iitm.ac.in", "day1": "This is my feedback: The session was very helpful and well structured!", "day2": "The bootcamp is well structured and the step by step guidance is very helpful for beginners.", "day3": "The bootcamp is very beginner friendly and well organized. Would love more practice exercises.", "day4": "The bootcamp is very well structured and beginner friendly. Looking forward to more sessions!", "day5": "The bootcamp has been an amazing learning experience. Everything was explained clearly step by step!"}, {"id": "298491", "email": "24f3003757@ds.study.iitm.ac.in", "day1": "The bootcamp is well organized and the instructions are clear. Thank you for putting this together.", "day2": "The bootcamp is well organized and the instructions are clear. Thank you for putting this together.", "day3": "The bootcamp is well organized and the instructions are clear. Thank you for putting this together.", "day4": "The bootcamp is well organized and the instructions are clear. Thank you for putting this together.", "day5": "The bootcamp is well organized and the instructions are clear. Thank you for putting this together."}, {"id": "298434", "email": "24f3005089@ds.study.iitm.ac.in", "day1": "The hands-on approach was very useful. More practice exercises would make learning even better.", "day2": "Examples involving real-world command pipelines helped a lot. More challenge exercises would be appreciated.", "day3": "The introduction to uv was extremely useful. It simplified dependency management significantly.", "day4": "The practical FastAPI examples were excellent. More API debugging exercises would be beneficial.", "day5": "The Git module was very practical and relevant. Real-world collaboration examples would be a useful addition."}, {"id": "298391", "email": "23f3002746@ds.study.iitm.ac.in", "day1": "The content was beginner-friendly and well structured. More practice exercises could make the learning experience even better.", "day2": "The explanations were clear. Additional real-world examples of shell scripting would be useful.", "day3": "The introduction to uv was very helpful. A few advanced examples would be interesting for experienced learners.", "day4": "The API section was engaging and practical. More mini-projects would help reinforce the concepts.", "day5": "The Git and GitHub topics were presented clearly. The overall bootcamp content was concise and useful for beginners."}, {"id": "298367", "email": "24f3002608@ds.study.iitm.ac.in", "day1": "The setup instructions were clear and easy to follow. A short troubleshooting guide for common WSL, Git, and VS Code issues could help beginners complete the setup faster.", "day2": "The hands-on exercises were helpful for understanding terminal usage. More practice questions involving pipes, redirection, and environment variables would make the concepts even easier to remember. A few real-world examples demonstrating how these commands are used in software development workflows would also be beneficial.  \n--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------", "day3": "The introduction to `uv` was very useful because it provides a modern alternative to traditional Python environment management. More hands-on exercises involving real project setups and dependency conflicts would help reinforce the concepts. A comparison between `pip`, `venv`, `conda`, and `uv` would also be helpful for beginners.   \n--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------", "day4": "The hands-on approach with DevTools, cURL, and FastAPI made the concepts easy to understand. It would be helpful to include a   few real-world API examples involving authentication tokens, rate limits, and common error scenarios. A small mini-project   connecting a frontend application to a FastAPI backend would also provide valuable practical experience.  \n-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------", "day5": "The hands-on exercises made Git concepts easier to understand. It would be helpful to include more examples involving collaboration workflows, such as branching, pull requests, merge conflicts, and code reviews. A small team-based activity could also help students experience how Git is used in real software development projects.\n------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------"}, {"id": "298170", "email": "24f2005112@ds.study.iitm.ac.in", "day1": "This is my feedback : The session was well-structured and beginner-friendly.", "day2": "This is my feedback \nThe explanations were clear and easy to follow.\nThe hands-on command examples helped reinforce the concepts.", "day3": "This is my feedback \nThe session was well structured and easy to follow.\nThe comparison between global package installation and virtual environments helped clarify why project isolation is important.", "day4": "", "day5": ""}, {"id": "298167", "email": "22f3002460@ds.study.iitm.ac.in", "day1": "", "day2": "go slowly, i feel session too fast", "day3": "", "day4": "", "day5": "adfasdg"}, {"id": "298054", "email": "23f3001252@ds.study.iitm.ac.in", "day1": "", "day2": "", "day3": "This is a prctical use of our knowledge. I am learning a lots of new things through this bootcamp.", "day4": "", "day5": ""}, {"id": "297867", "email": "23f2000729@ds.study.iitm.ac.in", "day1": "The session was beginner-friendly and practical.", "day2": "I request TA Team to take good session bootcamp session 2 was very bad. It was like they are practice for them self.", "day3": "The exercises were practical and helped me understand modern Python tooling. More examples comparing traditional pip workflows with UV workflows would make the concepts even clearer for beginners. I request to make it more practical", "day4": "The practical exercises were useful and helped connect theory with hands-on experience. More examples involving authentication, request debugging, and common API errors would make the exercises even more valuable.", "day5": ""}, {"id": "297844", "email": "24f2008630@ds.study.iitm.ac.in", "day1": "The bootcamp is well structured and beginner friendly. It would be helpful to have a short cheat sheet PDF for common Linux commands to refer to offline. Also, a quick troubleshooting guide for WSL installation issues on different Windows versions would save a lot of time for students who get stuck during setup. Overall, Day-1 was smooth and motivating!", "day2": "Day-2 was a big step up from Day-1 but still very approachable. The hands-on exercises with pipes and redirection were the highlight — doing it yourself is so much better than just reading about it. One suggestion: it would be great to have a small mini-challenge at the end of each day (like \"find the 5 most common words in a file using only shell commands\") to put everything together. That would make the learning stick even more!", "day3": "Day-3 felt like a real upgrade in workflow — `uv` is genuinely impressive and I can see myself using it daily. It would be helpful to have a side-by-side comparison table of `pip + venv` vs `uv` commands (e.g., `pip install X` → `uv add X`) so students coming from the traditional workflow can map things across easily. Also, a short note on when to use `.py` scripts vs `.ipynb` notebooks in real projects would be a great addition — the tradeoffs aren't always obvious for beginners.", "day4": "Day-4 was very practical and immediately useful. The hands-on FastAPI section was the highlight — going from zero to a working API with interactive docs in one session is very motivating. A small suggestion: it would be great to show a real-world example of authentication headers (like `Authorization: Bearer <token>`) when covering HTTP headers, so students understand how APIs are secured in practice. Also, a quick demo of how to handle CORS in FastAPI would be helpful since it's a very common pain point.", "day5": "Day-5 was probably the most practically important day so far — Git is something every developer uses daily. The explanation of the three states was excellent and should be taught even earlier. One suggestion: a visual diagram of the Git workflow (working tree → staging → local repo → remote repo) would really help visual learners. Also, a short section on how to undo mistakes (like `git restore`, `git reset`, and `git revert`) would be incredibly valuable — knowing how to fix errors is just as important as knowing how to commit correctly."}, {"id": "297581", "email": "24f2004796@ds.study.iitm.ac.in", "day1": "My suggestion is that /* ═══ Tab switching ═══ */
let submissionsLoaded = false;
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(id==='feedback'?0:1)));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));
  if(id==='submissions' && !submissionsLoaded){submissionsLoaded=true;loadAllSubmissions();}
}

/* ═══ Helpers ═══ */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function initials(e){const p=e.split('@')[0].replace(/[^a-zA-Z]/g,' ').trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():e.slice(0,2).toUpperCase()}

/* ═══ TAB 1: Feedback ═══ */
function buildStats(){
  const bar=document.getElementById('statsBar');
  for(let d=1;d<=5;d++){
    const cnt=FEEDBACK.filter(s=>(s['day'+d]||'').trim().length>=2).length;
    bar.innerHTML+=`<div class="stat-chip"><span class="dot" style="background:${COLORS[d-1]}"></span><span>${DAY[d].icon} ${DAY[d].label.split('—')[0]}</span><span class="count" style="color:${COLORS[d-1]}">${cnt}</span><span style="color:var(--muted)">responses</span></div>`;
  }
}

function buildGrid(data){
  const g=document.getElementById('dayGrid');g.innerHTML='';
  const layout=[[1,2],[3,4],[5]];
  for(const row of layout){
    for(const day of row){
      const m=DAY[day],key='day'+day;
      const rows=data.filter(s=>(s[key]||'').trim().length>=2);
      const total=FEEDBACK.filter(s=>(s[key]||'').trim().length>=2).length;
      const span2=row.length===1?' span2':'';
      const col=document.createElement('div');col.className='day-col '+m.cls+span2;
      col.innerHTML=`<div class="day-hdr"><div class="day-icon">${m.icon}</div><span class="day-label">${m.label}</span><span class="day-badge">${rows.length}/${total}</span></div>`;
      const c=document.createElement('div');c.className=span2?'cards-cont':'';col.appendChild(c);
      if(!rows.length){c.innerHTML='<p style="padding:20px;color:var(--muted);font-style:italic">No results.</p>';}
      else for(const s of rows){
        const long=s[key].length>280;
        const uid='ft-'+day+'-'+s.id;
        const d2=document.createElement('div');d2.className='card';d2.dataset.id=s.id;d2.dataset.email=s.email;d2.dataset.text=s[key].toLowerCase();
        d2.innerHTML=`<div class="card-head"><div class="avatar">${esc(initials(s.email))}</div><div><div class="card-id"># ${esc(s.id)}</div><div class="card-email" title="${esc(s.email)}">${esc(s.email)}</div></div></div><div class="fb-text" id="${uid}">${esc(s[key]).replace(/\n/g,'<br>')}</div>${long?`<button class="expand-btn vis" onclick="toggleExp(this,'${uid}')">Show more ▾</button>`:''}`;
        c.appendChild(d2);
      }
      g.appendChild(col);
    }
  }
  const q=document.getElementById('search').value.trim();
  document.getElementById('result-count').textContent=q?`${data.length} student${data.length!==1?'s':''} matching "${q}"`:'';
}

function toggleExp(btn,id){const el=document.getElementById(id);if(el.classList.toggle('expanded')){btn.textContent='Show less ▴';}else{btn.textContent='Show more ▾';}}
function filterCards(){const q=document.getElementById('search').value.toLowerCase().trim();if(!q){buildGrid(FEEDBACK);return;}const f=FEEDBACK.filter(s=>s.id.toLowerCase().includes(q)||s.email.toLowerCase().includes(q)||[1,2,3,4,5].some(d=>(s['day'+d]||'').toLowerCase().includes(q)));buildGrid(f);}

/* ═══ TAB 2: Submissions ═══ */
const cache={};
async function fetchMD(url){
  if(!url||!url.startsWith('http'))return null;
  if(cache[url]!==undefined)return cache[url];
  try{const r=await fetch(url);if(!r.ok){cache[url]=null;return null;}const t=await r.text();cache[url]=t;return t;}catch(e){cache[url]=null;return null;}
}

function parseMD(text,day){
  if(!text)return{before:'',after:'',feedback:'',checklist:[]};
  const lines=text.split('\n');
  function section(pat){
    let inside=false,out=[];
    for(const l of lines){if(!inside){if(pat.test(l)){inside=true;}}else{if(/^\s*---\s*$/.test(l))break;out.push(l);}}
    return out.join('\n').trim();
  }
  const before=section(new RegExp('---\\s*Before\\s+Day-'+day+'\\s*---','i'));
  const after=section(new RegExp('---\\s*After\\s+Day-'+day+'\\s*---','i'));
  const feedback=section(/---\s*Feedback\s*\(Suggestions for the TDS Team\)\s*---/i);
  const checklist=[];
  for(const l of lines){
    const m=l.match(/^- \[([ xX])\] (.+)/);
    if(m)checklist.push({checked:m[1]!=='  '&&m[1]!==' ',text:m[2].trim()});
  }
  return{before,after,feedback,checklist};
}

async function loadAllSubmissions(){
  const list=document.getElementById('stuList');list.innerHTML='';
  const total=STUDENTS_ALL.length;let done=0;

  // Build all accordions first
  for(const s of STUDENTS_ALL){
    const acc=document.createElement('div');acc.className='stu-acc';acc.id='stu-'+s.id;
    acc.dataset.email=s.email.toLowerCase();acc.dataset.id=s.id;
    acc.innerHTML=`<div class="stu-top" onclick="this.parentElement.classList.toggle('open')"><div class="av2">${esc(initials(s.email))}</div><div class="info"><div class="em">${esc(s.email)}</div><div class="sid">#${esc(s.id)} · Score: ${s.score}/5</div></div><span class="sc">${s.score}/5</span><span class="arrow">▼</span></div><div class="stu-body" id="sbody-${s.id}"><div class="stu-loading">⏳ Loading data from GitHub…</div></div>`;
    list.appendChild(acc);
  }

  // Fetch all data in batches of 10
  const BATCH=10;
  for(let i=0;i<total;i+=BATCH){
    const batch=STUDENTS_ALL.slice(i,i+BATCH);
    await Promise.all(batch.map(s=>loadOneStudent(s)));
    done=Math.min(i+BATCH,total);
    const pct=Math.round(done/total*100);
    document.getElementById('loadFill').style.width=pct+'%';
    document.getElementById('loadPct').textContent=pct+'%';
  }
  document.getElementById('loadBar').innerHTML='<span style="color:var(--day3);font-weight:600">✅ All '+total+' students loaded</span>';
}

async function loadOneStudent(s){
  const body=document.getElementById('sbody-'+s.id);
  let html='';
  for(let day=1;day<=5;day++){
    const url=s['day'+day];
    const m=DAY[day];
    html+=`<div class="day-sec"><div class="day-sec-hdr"><span class="di">${m.icon}</span><span style="color:${COLORS[day-1]}">${m.label}</span>`;
    if(!url){html+=`</div><div class="sec-block"><p class="placeholder">No submission for this day.</p></div></div>`;continue;}
    const md=await fetchMD(url);
    if(md===null){html+=`</div><div class="stu-error">⚠️ Could not fetch: ${esc(url.split('/').slice(3,5).join('/'))}</div></div>`;continue;}
    const p=parseMD(md,day);
    html+=`</div>`;
    // Before
    html+=`<div class="sec-block"><h4>📝 Before Day-${day}</h4>${p.before?`<p>${esc(p.before).replace(/\n/g,'<br>')}</p>`:'<p class="placeholder">No entry.</p>'}</div>`;
    // Checklist
    if(p.checklist.length){
      const done=p.checklist.filter(c=>c.checked).length;
      html+=`<div class="sec-block"><h4>✅ Checklist (${done}/${p.checklist.length})</h4><div class="cl-items">`;
      for(const c of p.checklist){
        html+=`<div class="cl-item ${c.checked?'checked':'unchecked'}"><div class="ck">${c.checked?'✓':''}</div><span>${esc(c.text)}</span></div>`;
      }
      html+=`</div></div>`;
    }
    // After
    html+=`<div class="sec-block"><h4>💡 After Day-${day}</h4>${p.after?`<p>${esc(p.after).replace(/\n/g,'<br>')}</p>`:'<p class="placeholder">No entry.</p>'}</div>`;
    // Feedback
    html+=`<div class="sec-block"><h4>💬 Feedback</h4>${p.feedback?`<p>${esc(p.feedback).replace(/\n/g,'<br>')}</p>`:'<p class="placeholder">No feedback.</p>'}</div>`;
    html+=`</div>`;
  }
  body.innerHTML=html;
}

function filterStudents(){
  const q=document.getElementById('search2').value.toLowerCase().trim();
  document.querySelectorAll('.stu-acc').forEach(el=>{
    if(!q){el.classList.remove('hidden');return;}
    const match=el.dataset.email.includes(q)||el.dataset.id.includes(q);
    el.classList.toggle('hidden',!match);
  });
}
